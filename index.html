<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSNotes - Kenyan Educational Resource Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- Top Header Navigation Bar -->
    <header class="navbar">
        <div class="logo" id="nav-logo">SSNotes</div>
        <div class="nav-controls">
            <!-- Custom Back Button that mimics browser back behavior -->
            <button class="control-btn" id="back-btn" title="Go Back">⬅ Back</button>
            <!-- Toggle Switch to swap colors instantly -->
            <button class="control-btn" id="theme-toggle" title="Toggle Theme">🌓 Light Mode</button>
        </div>
    </header>

    <!-- Main Content Area where JavaScript injects different screens -->
    <main class="app-container" id="app-view">
        <!-- Views will be dynamically loaded here by script.js -->
    </main>

    <script src="script.js"></script>
</body>
</html>
